<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>外商薪資計算機</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<style>
  :root {
    --claude-cream: #faf9f5;
    --claude-paper: #ffffff;
    --claude-ink: #2d2a26;
    --claude-muted: #6b6862;
    --claude-line: #e8e5dc;
    --claude-copper: #cc785c;
    --claude-copper-dark: #b8654a;
    --claude-copper-soft: #f4e9e2;
    --claude-tan: #c9a875;
    --claude-walnut: #8b6f47;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--claude-cream);
    color: var(--claude-ink);
  }
  .font-serif-display {
    font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
    font-feature-settings: "ss01", "ss02";
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* 所有可編輯數字欄位都帶淡銅橘背景作為視覺提示 */
  input[type="number"] {
    background-color: rgba(204, 120, 92, 0.07);
    border-radius: 4px;
    transition: background-color 0.15s ease, box-shadow 0.15s ease;
    cursor: text;
  }
  input[type="number"]:hover {
    background-color: rgba(204, 120, 92, 0.15);
  }
  input[type="number"]:focus {
    background-color: rgba(204, 120, 92, 0.2);
    outline: none;
    box-shadow: 0 0 0 2px rgba(204, 120, 92, 0.45);
  }
  /* 匯出截圖時移除背景與 ring,保持輸出乾淨 */
  body.capturing input[type="number"] {
    background-color: transparent;
    box-shadow: none;
  }
  .export-only { display: none; }
  body.capturing .no-export { display: none !important; }
  body.capturing .export-only { display: block !important; }
  /* Custom utility classes mapped to Claude palette */
  .text-ink { color: var(--claude-ink); }
  .text-muted { color: var(--claude-muted); }
  .text-copper { color: var(--claude-copper); }
  .text-copper-dark { color: var(--claude-copper-dark); }
  .text-walnut { color: var(--claude-walnut); }
  .bg-cream { background-color: var(--claude-cream); }
  .bg-paper { background-color: var(--claude-paper); }
  .bg-copper { background-color: var(--claude-copper); }
  .bg-copper-soft { background-color: var(--claude-copper-soft); }
  .bg-tan { background-color: var(--claude-tan); }
  .bg-walnut { background-color: var(--claude-walnut); }
  .border-line { border-color: var(--claude-line); }
  .ring-copper { --tw-ring-color: var(--claude-copper); }
  .focus-copper:focus { outline: 2px solid var(--claude-copper); outline-offset: 1px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef } = React;

// ---- Icons (lucide-style inline SVGs, 1.5 stroke for softer Claude look) ----
const Icon = ({ size = 20, children, className = "", stroke = 1.75 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
       fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
       className={className}>{children}</svg>
);
const Calendar       = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
const Plus           = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Minus          = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Camera         = (p) => <Icon {...p}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></Icon>;
const Loader2        = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
const TrendingUp     = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
const DollarSign     = (p) => <Icon {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Icon>;
const Percent        = (p) => <Icon {...p}><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></Icon>;
const ArrowUp        = (p) => <Icon {...p}><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></Icon>;
const ArrowDown      = (p) => <Icon {...p}><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></Icon>;
const Sparkles       = (p) => <Icon {...p}><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 14l.75 2.25L22 17l-2.25.75L19 20l-.75-2.25L16 17l2.25-.75z"/><path d="M5 16l.5 1.5L7 18l-1.5.5L5 20l-.5-1.5L3 18l1.5-.5z"/></Icon>;
const ChartBar       = (p) => <Icon {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></Icon>;
const ChevronDown    = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
const BookOpen       = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
const Download       = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
const Upload         = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;

// Numeric input wrapper — auto-selects current value on focus so typing replaces it
const NumInput = (props) => <input type="number" {...props} onFocus={(e) => e.target.select()} />;

// ---- Main App ----
const App = () => {
  const exportRef = useRef(null);
  const fileInputRef = useRef(null);
  const [isCapturing, setIsCapturing] = useState(false);
  const [importMsg, setImportMsg] = useState(null);  // {type:'ok'|'err', text:string}

  const [currentStockPrice, setCurrentStockPrice] = useState(150);
  const [showHelp, setShowHelp] = useState(false);

  // 每年底薪都可獨立編輯,作為單一資料來源;調薪%改為衍生值
  // 預設範例:年薪 150 萬起、每年調薪 3%
  const [baseSalaries, setBaseSalaries] = useState({
    2024: 1500000,
    2025: 1545000,    // +3%
    2026: 1591350,    // +3%
    2027: 1639091,    // +3%
    2028: 1688263     // +3%
  });

  const [esppSettings, setEsppSettings] = useState([
    { year: 2024, cost: 120 },
    { year: 2025, cost: 120 },
    { year: 2026, cost: 130 },
    { year: 2027, cost: 130 },
    { year: 2028, cost: 140 }
  ]);

  const [rsuSettings, setRsuSettings] = useState([
    { id: 1, label: "RSU#1", cost: 100, totalGrant: 200, startYear: 2024 },
    { id: 2, label: "RSU#2", cost: 120, totalGrant: 100, startYear: 2025 },
    { id: 3, label: "RSU#3", cost: 140, totalGrant: 100, startYear: 2026 },
    { id: 4, label: "RSU#4", cost: 150, totalGrant: 100, startYear: 2027 },
    { id: 5, label: "RSU#5", cost: 150, totalGrant: 100, startYear: 2028 },
  ]);

  const updateSetting = (list, setList, idOrYear, field, value) => {
    const key = list[0].id ? 'id' : 'year';
    setList(prev => prev.map(item => item[key] === idOrYear ? { ...item, [field]: Number(value) } : item));
  };

  const updateBaseSalary = (year, value) => {
    setBaseSalaries(prev => ({ ...prev, [year]: Number(value) || 0 }));
  };

  // 調薪% 是衍生值,反向也可改 → 改% 會更新該年的底薪
  const getRaisePct = (year) => {
    if (year === 2024) return null;
    const prev = baseSalaries[year - 1];
    if (!prev) return 0;
    return Number((((baseSalaries[year] / prev) - 1) * 100).toFixed(1));
  };
  const setRaisePct = (year, pct) => {
    const prev = baseSalaries[year - 1] || 0;
    setBaseSalaries(s => ({ ...s, [year]: Math.round(prev * (1 + (Number(pct) || 0) / 100)) }));
  };

  const yearlyData = useMemo(() => {
    const data = [];
    for (let year = 2024; year <= 2028; year++) {
      const currentBase = baseSalaries[year] || 0;

      const espp = esppSettings.find(s => s.year === year);
      const esppInv = currentBase / 4;
      const esppGain = espp && espp.cost > 0 ? (esppInv * (currentStockPrice / espp.cost) - esppInv) : 0;

      const getRsuVal = (id) => {
        const setting = rsuSettings.find(s => s.id === id);
        if (!setting || setting.totalGrant === 0 || setting.cost === 0) return 0;
        const startYear = setting.startYear;
        if (year < startYear || year >= startYear + 4) return 0;
        const priceGainRatio = currentStockPrice / setting.cost;
        const annualVest = (setting.totalGrant * 10000) / 4;
        return annualVest * priceGainRatio;
      };

      const r1 = getRsuVal(1), r2 = getRsuVal(2), r3 = getRsuVal(3), r4 = getRsuVal(4), r5 = getRsuVal(5);
      const rsuTotal = r1 + r2 + r3 + r4 + r5;
      const total = currentBase + esppGain + rsuTotal;

      data.push({
        year, base: Math.round(currentBase), esppGain: Math.round(esppGain),
        r1: Math.round(r1), r2: Math.round(r2), r3: Math.round(r3),
        r4: Math.round(r4), r5: Math.round(r5),
        rsuTotal: Math.round(rsuTotal), total: Math.round(total)
      });
    }
    return data;
  }, [currentStockPrice, baseSalaries, rsuSettings, esppSettings]);

  const maxTC = useMemo(() => Math.max(...yearlyData.map(d => d.total), 1), [yearlyData]);
  const formatCurrency = (val) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(val);

  const handleExportJSON = () => {
    const payload = {
      version: 1,
      savedAt: new Date().toISOString(),
      currentStockPrice,
      baseSalaries,
      esppSettings,
      rsuSettings
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    a.download = `薪資試算_${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setImportMsg({ type: 'ok', text: '已匯出 JSON' });
    setTimeout(() => setImportMsg(null), 2500);
  };

  const handleImportJSON = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (typeof data.currentStockPrice === 'number') setCurrentStockPrice(data.currentStockPrice);
        if (data.baseSalaries && typeof data.baseSalaries === 'object') setBaseSalaries(data.baseSalaries);
        if (Array.isArray(data.esppSettings)) setEsppSettings(data.esppSettings);
        if (Array.isArray(data.rsuSettings)) setRsuSettings(data.rsuSettings);
        setImportMsg({ type: 'ok', text: `已載入 ${file.name}` });
      } catch (err) {
        setImportMsg({ type: 'err', text: '檔案格式錯誤,無法讀取' });
      }
      setTimeout(() => setImportMsg(null), 3000);
    };
    reader.readAsText(file);
  };

  const handleExportImage = async () => {
    if (isCapturing) return;
    setIsCapturing(true);
    document.body.classList.add('capturing');
    try {
      await new Promise(r => setTimeout(r, 50));
      const canvas = await window.html2canvas(exportRef.current, {
        scale: 2, useCORS: true, backgroundColor: '#faf9f5',
        ignoreElements: (el) => el.classList && el.classList.contains('no-export')
      });
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = `薪資收益分析_${new Date().toLocaleDateString()}.png`;
      link.click();
    } finally {
      document.body.classList.remove('capturing');
      setIsCapturing(false);
    }
  };

  const ProfitBadge = ({ cost, current }) => {
    if (!cost) return null;
    const pct = ((current - cost) / cost * 100).toFixed(1);
    const isPositive = Number(pct) >= 0;
    return (
      <span className={`inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded-md ${isPositive ? 'text-emerald-700 bg-emerald-50' : 'text-rose-700 bg-rose-50'}`}>
        {isPositive ? '▲' : '▼'} {Math.abs(pct)}%
      </span>
    );
  };

  return (
    <div className="min-h-screen bg-cream p-4 md:p-8" ref={exportRef}>
      <div className="max-w-7xl mx-auto space-y-6">

        {/* Header */}
        <header className="bg-paper border border-line rounded-2xl p-6 flex flex-col lg:flex-row items-center justify-between gap-6">
          <div className="flex items-center gap-5">
            <div className="w-12 h-12 rounded-xl bg-copper flex items-center justify-center text-white">
              <Sparkles size={22} stroke={2}/>
            </div>
            <div>
              <h1 className="font-serif-display text-3xl text-ink leading-tight">薪資收益試算系統</h1>
              <p className="text-sm text-muted mt-1 tracking-wide">Wealth Accumulation Analysis · 五年期收益模擬</p>
            </div>
            <div className="no-export ml-2 flex items-center gap-1.5 border-l border-line pl-3">
              <button onClick={handleExportJSON} title="把目前所有設定下載成 JSON 檔"
                className="px-2.5 py-2 flex items-center gap-1.5 text-muted hover:text-copper hover:bg-copper-soft rounded-lg transition-colors">
                <Download size={16}/>
                <span className="text-xs font-medium">匯出</span>
              </button>
              <button onClick={() => fileInputRef.current?.click()} title="選擇先前匯出的 JSON 檔還原設定"
                className="px-2.5 py-2 flex items-center gap-1.5 text-muted hover:text-copper hover:bg-copper-soft rounded-lg transition-colors">
                <Upload size={16}/>
                <span className="text-xs font-medium">載入</span>
              </button>
              <button onClick={handleExportImage} disabled={isCapturing} title="把整頁存成 PNG 圖檔"
                className="px-2.5 py-2 flex items-center gap-1.5 text-muted hover:text-copper hover:bg-copper-soft rounded-lg transition-colors">
                {isCapturing ? <Loader2 size={16} className="animate-spin"/> : <Camera size={16}/>}
                <span className="text-xs font-medium">截圖</span>
              </button>
              <input ref={fileInputRef} type="file" accept="application/json,.json"
                className="hidden"
                onChange={(e) => { handleImportJSON(e.target.files[0]); e.target.value = ''; }}/>
            </div>
            {importMsg && (
              <span className={`no-export text-xs font-medium px-2.5 py-1 rounded-md ${importMsg.type === 'ok' ? 'text-emerald-700 bg-emerald-50' : 'text-rose-700 bg-rose-50'}`}>
                {importMsg.text}
              </span>
            )}
          </div>

          <div className="flex items-center gap-5 bg-cream border border-line rounded-xl px-6 py-3">
            <div className="text-right">
              <div className="text-[11px] uppercase tracking-widest text-muted font-medium">目前股價</div>
              <div className="text-[10px] text-copper font-medium font-serif-display italic">USD</div>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={()=>setCurrentStockPrice(p=>Math.max(0, p-5))}
                className="no-export w-8 h-8 flex items-center justify-center bg-paper border border-line text-muted hover:text-copper hover:border-copper rounded-lg transition-colors">
                <Minus size={16}/>
              </button>
              <div className="flex items-center font-serif-display text-3xl text-ink">
                <span className="text-muted">$</span>
                <NumInput value={currentStockPrice}
                  onChange={(e)=>setCurrentStockPrice(Number(e.target.value)||0)}
                  className="w-20 bg-transparent text-center outline-none focus:bg-copper-soft rounded-md transition-colors"/>
              </div>
              <button onClick={()=>setCurrentStockPrice(p=>p+5)}
                className="no-export w-8 h-8 flex items-center justify-center bg-paper border border-line text-muted hover:text-copper hover:border-copper rounded-lg transition-colors">
                <Plus size={16}/>
              </button>
            </div>
          </div>
        </header>

        {/* Help / Tutorial — collapsible */}
        <section className="bg-paper border border-line rounded-2xl overflow-hidden">
          <button onClick={()=>setShowHelp(s=>!s)}
            className="w-full px-6 py-4 flex items-center justify-between hover:bg-cream transition-colors group">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-lg bg-copper-soft text-copper-dark flex items-center justify-center">
                <BookOpen size={18}/>
              </div>
              <div className="text-left">
                <h2 className="font-serif-display text-lg text-ink">使用說明 · 第一次使用請先讀</h2>
                <p className="text-xs text-muted mt-0.5">How to Use · 5 個欄位的填寫方式與計算邏輯</p>
              </div>
            </div>
            <ChevronDown size={20} className={`text-muted transition-transform ${showHelp ? 'rotate-180' : ''}`}/>
          </button>

          {showHelp && (
            <div className="px-6 pb-6 pt-2 border-t border-line space-y-5 text-sm text-ink">

              <div className="flex gap-4 pt-3">
                <div className="shrink-0 w-7 h-7 rounded-full bg-copper text-white flex items-center justify-center font-serif-display text-sm">1</div>
                <div className="flex-1">
                  <div className="font-serif-display text-base text-ink mb-1">目前股價 (USD)</div>
                  <p className="text-muted leading-relaxed">
                    輸入你預估的「當下」或「未來」股價,影響所有 ESPP 與 RSU 的計算。
                    例如:預估股價維持 <span className="font-mono text-copper-dark">$150</span> 時的收益。
                  </p>
                </div>
              </div>

              <div className="flex gap-4">
                <div className="shrink-0 w-7 h-7 rounded-full bg-copper text-white flex items-center justify-center font-serif-display text-sm">2</div>
                <div className="flex-1">
                  <div className="font-serif-display text-base text-ink mb-1">底薪 (TWD)</div>
                  <p className="text-muted leading-relaxed">
                    每年底薪都可獨立修改,兩種方式:<br/>
                    <span className="text-ink">方式 A：</span>直接點選「底薪」欄位輸入該年實際年薪 (TWD)<br/>
                    <span className="text-ink">方式 B：</span>輸入「調薪 %」欄位,系統會自動從前一年底薪換算
                  </p>
                </div>
              </div>

              <div className="flex gap-4">
                <div className="shrink-0 w-7 h-7 rounded-full bg-copper text-white flex items-center justify-center font-serif-display text-sm">3</div>
                <div className="flex-1">
                  <div className="font-serif-display text-base text-ink mb-1">ESPP 取得成本價 (USD)</div>
                  <p className="text-muted leading-relaxed">
                    公司 ESPP 計畫提供折扣價購買股票。輸入該年實際的「買入成本價」。<br/>
                    <span className="text-ink">計算假設：</span>每年用底薪的 <span className="font-mono text-copper-dark">25%</span> 投入 ESPP<br/>
                    <span className="text-ink">公式：</span><span className="font-mono text-xs bg-cream px-2 py-1 rounded">淨利 = 25%底薪 × (現價 ÷ 成本價 − 1)</span>
                  </p>
                </div>
              </div>

              <div className="flex gap-4">
                <div className="shrink-0 w-7 h-7 rounded-full bg-copper text-white flex items-center justify-center font-serif-display text-sm">4</div>
                <div className="flex-1">
                  <div className="font-serif-display text-base text-ink mb-1">RSU 授予細項</div>
                  <p className="text-muted leading-relaxed mb-2">
                    每筆 RSU 預設 <span className="text-ink">4 年 vest</span> 完畢(每年領 25%)。每張卡片三個欄位:
                  </p>
                  <ul className="space-y-1.5 text-muted leading-relaxed ml-2">
                    <li><span className="text-ink">起始年份(右上角)：</span>第一次 vest 的年份</li>
                    <li><span className="text-ink">授予總額 (萬)：</span>授予當下的台幣面值總額,例:200 萬</li>
                    <li><span className="text-ink">成本價 USD：</span>授予當下的股價,用來算後續股價漲跌的收益倍數</li>
                  </ul>
                  <div className="mt-3 p-3 bg-cream border border-line rounded-lg text-xs text-muted leading-relaxed">
                    <span className="text-copper-dark font-medium">範例：</span>2024 年授予 200 萬 @ $100,目前股價 $150<br/>
                    → 每年 vest = 200萬 ÷ 4 = <span className="font-mono text-ink">50 萬</span><br/>
                    → 實際價值 = 50萬 × (150 ÷ 100) = <span className="font-mono text-copper-dark">75 萬</span>
                  </div>
                </div>
              </div>

              <div className="flex gap-4">
                <div className="shrink-0 w-7 h-7 rounded-full bg-copper text-white flex items-center justify-center font-serif-display text-sm">5</div>
                <div className="flex-1">
                  <div className="font-serif-display text-base text-ink mb-1">圖表閱讀</div>
                  <p className="text-muted leading-relaxed">
                    下方柱狀圖由三色堆疊:<span className="text-copper-dark">底薪</span> + <span className="text-walnut">ESPP 淨利</span> + <span className="font-medium" style={{color:'var(--claude-walnut)'}}>RSU 收益</span> = 總年薪 (TC)。
                    滑鼠停留可看詳細佔比與年度增減 (YoY)。
                  </p>
                </div>
              </div>

              <div className="flex gap-4">
                <div className="shrink-0 w-7 h-7 rounded-full bg-copper text-white flex items-center justify-center font-serif-display text-sm">6</div>
                <div className="flex-1">
                  <div className="font-serif-display text-base text-ink mb-1">儲存與載入 (右上角圖示)</div>
                  <p className="text-muted leading-relaxed">
                    <span className="inline-flex items-center gap-1 text-ink"><Download size={14}/> 匯出</span>:把目前所有設定下載成 JSON 檔(例: <span className="font-mono text-xs">薪資試算_2026-05-14.json</span>)<br/>
                    <span className="inline-flex items-center gap-1 text-ink"><Upload size={14}/> 載入</span>:選擇之前匯出的 JSON 檔,一鍵還原全部設定<br/>
                    <span className="inline-flex items-center gap-1 text-ink"><Camera size={14}/> 截圖</span>:把整頁存成 PNG 圖檔分享
                  </p>
                  <div className="mt-2 text-xs text-muted">
                    建議存多份情境,例:<span className="font-mono text-copper-dark">薪資-樂觀.json</span>、<span className="font-mono text-copper-dark">薪資-保守.json</span>
                  </div>
                </div>
              </div>

              <div className="pt-3 border-t border-line text-xs text-muted italic font-serif-display leading-relaxed">
                ※ 本工具不會自動儲存任何資料 — 所有數值只存在瀏覽器記憶體裡,關閉頁面即清除。
                如需保留設定,請使用上方匯出 JSON 功能,檔案儲存在你自己的電腦上。
              </div>
            </div>
          )}
        </section>

        {/* Settings — ESPP & RSU */}
        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">

          {/* ESPP */}
          <section className="bg-paper border border-line rounded-2xl p-6">
            <div className="flex items-center gap-3 mb-5">
              <div className="w-9 h-9 rounded-lg bg-copper-soft text-copper-dark flex items-center justify-center">
                <Percent size={18}/>
              </div>
              <div>
                <h2 className="font-serif-display text-lg text-ink">ESPP 取得成本價</h2>
                <p className="text-xs text-muted mt-0.5">Employee Stock Purchase Plan · 每年成本價設定</p>
              </div>
            </div>
            <div className="grid grid-cols-5 gap-2">
              {esppSettings.map(s => (
                <div key={s.year} className="border border-line rounded-xl p-3 text-center hover:border-copper transition-colors">
                  <div className="text-[11px] text-muted font-medium mb-2">{s.year}</div>
                  <NumInput value={s.cost}
                    onChange={(e)=>updateSetting(esppSettings, setEsppSettings, s.year, 'cost', e.target.value)}
                    className="w-full text-center font-serif-display text-base text-ink bg-transparent outline-none border-b border-transparent focus:border-copper pb-1"/>
                  <div className="mt-2 flex justify-center">
                    <ProfitBadge cost={s.cost} current={currentStockPrice}/>
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* RSU */}
          <section className="bg-paper border border-line rounded-2xl p-6">
            <div className="flex items-center gap-3 mb-5">
              <div className="w-9 h-9 rounded-lg bg-copper-soft text-copper-dark flex items-center justify-center">
                <DollarSign size={18}/>
              </div>
              <div>
                <h2 className="font-serif-display text-lg text-ink">RSU 授予細項</h2>
                <p className="text-xs text-muted mt-0.5">Restricted Stock Units · 每筆授予 4 年 vest 完畢、每年領 25%</p>
              </div>
            </div>
            <div className="grid grid-cols-5 gap-2">
              {rsuSettings.map(s => (
                <div key={s.id} className="border border-line rounded-xl p-3 hover:border-copper transition-colors">
                  {/* Year chip on top */}
                  <span className="inline-flex items-baseline gap-0.5 text-[10px] text-copper-dark font-medium bg-copper-soft px-1.5 py-0.5 rounded whitespace-nowrap">
                    <NumInput value={s.startYear}
                      onChange={(e)=>updateSetting(rsuSettings, setRsuSettings, s.id, 'startYear', e.target.value)}
                      className="w-9 text-center bg-transparent outline-none"/>
                    <span>起</span>
                  </span>

                  {/* RSU label below */}
                  <div className="text-sm font-medium text-ink mt-2 whitespace-nowrap">{s.label}</div>
                  <div className="text-[10px] text-muted whitespace-nowrap">vest 至 {s.startYear + 3}</div>

                  {/* Hero: grant amount — centered */}
                  <div className="mt-4 text-center">
                    <div className="flex items-baseline justify-center">
                      <NumInput value={s.totalGrant}
                        onChange={(e)=>updateSetting(rsuSettings, setRsuSettings, s.id, 'totalGrant', e.target.value)}
                        className="font-serif-display text-2xl text-copper-dark bg-transparent outline-none w-14 text-right"/>
                      <span className="text-sm text-muted ml-1">萬</span>
                    </div>
                    <div className="text-[10px] text-muted tracking-wide mt-0.5 whitespace-nowrap">授予總額</div>
                  </div>

                  {/* Separator */}
                  <div className="h-px bg-line my-3"></div>

                  {/* Cost — centered */}
                  <div className="text-center">
                    <div className="flex items-baseline justify-center">
                      <span className="text-sm text-muted">$</span>
                      <NumInput value={s.cost}
                        onChange={(e)=>updateSetting(rsuSettings, setRsuSettings, s.id, 'cost', e.target.value)}
                        className="font-mono text-lg text-ink bg-transparent outline-none w-12 text-right"/>
                      <span className="text-xs text-muted ml-1">USD</span>
                    </div>
                    <div className="text-[10px] text-muted tracking-wide mt-0.5 whitespace-nowrap">授予成本價</div>
                  </div>
                </div>
              ))}
            </div>
          </section>
        </div>

        {/* Yearly Detail Table */}
        <section className="bg-paper border border-line rounded-2xl overflow-hidden">
          <header className="px-6 py-5 border-b border-line flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-lg bg-copper-soft text-copper-dark flex items-center justify-center">
                <Calendar size={18}/>
              </div>
              <div>
                <h2 className="font-serif-display text-lg text-ink">年度收益細節預估</h2>
                <p className="text-xs text-muted mt-0.5">Annual Breakdown · 所有欄位皆可編輯</p>
              </div>
            </div>
            <span className="text-[11px] text-muted font-medium italic font-serif-display">點擊任一數值即可修改</span>
          </header>

          <div className="w-full">
            <table className="w-full text-left border-collapse table-fixed">
              <thead>
                <tr className="text-muted text-[10px] uppercase tracking-widest border-b border-line">
                  <th className="px-3 py-3 w-[7%] font-medium">年份</th>
                  <th className="px-3 py-3 w-[9%] text-center font-medium">調薪 %</th>
                  <th className="px-3 py-3 w-[15%] text-right font-medium">底薪 (TWD)</th>
                  <th className="px-3 py-3 w-[12%] text-right font-medium text-copper-dark">ESPP 淨利</th>
                  <th className="px-3 py-3 w-[7.5%] text-right font-medium">RSU#1</th>
                  <th className="px-3 py-3 w-[7.5%] text-right font-medium">RSU#2</th>
                  <th className="px-3 py-3 w-[7.5%] text-right font-medium">RSU#3</th>
                  <th className="px-3 py-3 w-[7.5%] text-right font-medium">RSU#4</th>
                  <th className="px-3 py-3 w-[7.5%] text-right font-medium">RSU#5</th>
                  <th className="px-3 py-3 w-[19%] text-right font-semibold text-ink bg-copper-soft">總年薪 (TC)</th>
                </tr>
              </thead>
              <tbody>
                {yearlyData.map((row, i) => {
                  const raisePct = getRaisePct(row.year);
                  return (
                    <tr key={row.year} className="border-b border-line/60 hover:bg-cream transition-colors">
                      <td className="px-3 py-3 font-serif-display text-lg text-ink">{row.year}</td>

                      <td className="px-3 py-3 text-center">
                        {row.year === 2024 ? (
                          <span className="text-muted/40 font-mono text-sm">—</span>
                        ) : (
                          <span className="inline-flex items-center gap-1 border border-line rounded-md px-2 py-1 focus-within:border-copper transition-colors">
                            <NumInput step="0.1" value={raisePct}
                              onChange={(e)=>setRaisePct(row.year, e.target.value)}
                              className="w-10 text-center text-copper-dark font-medium text-sm bg-transparent outline-none"/>
                            <span className="text-[10px] text-muted">%</span>
                          </span>
                        )}
                      </td>

                      <td className="px-3 py-3 text-right">
                        <span className="inline-flex items-center gap-1.5 border border-line rounded-md px-2 py-1 focus-within:border-copper transition-colors w-full max-w-[150px] ml-auto">
                          <NumInput value={baseSalaries[row.year]}
                            onChange={(e)=>updateBaseSalary(row.year, e.target.value)}
                            className="w-full text-right font-mono text-sm text-ink bg-transparent outline-none"/>
                          <span className="text-[9px] text-muted shrink-0">TWD</span>
                        </span>
                      </td>

                      <td className="px-3 py-3 font-mono text-right text-sm text-copper-dark">
                        {row.esppGain >= 0 ? '+' : ''}{formatCurrency(row.esppGain)}
                      </td>

                      {[row.r1, row.r2, row.r3, row.r4, row.r5].map((v, k) => (
                        <td key={k} className="px-3 py-3 font-mono text-right text-[11px] text-muted">
                          {v > 0 ? formatCurrency(v) : '—'}
                        </td>
                      ))}

                      <td className="px-3 py-3 font-serif-display text-right text-lg text-ink bg-copper-soft/60">
                        {formatCurrency(row.total)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </section>

        {/* Chart */}
        <section className="bg-paper border border-line rounded-2xl p-8">
          <header className="flex items-center justify-between gap-4 mb-8 flex-wrap">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-lg bg-copper-soft text-copper-dark flex items-center justify-center">
                <ChartBar size={18}/>
              </div>
              <div>
                <h2 className="font-serif-display text-lg text-ink">未來五年收益視覺化趨勢</h2>
                <p className="text-xs text-muted mt-0.5">Stacked Wealth Growth · 滑鼠移過柱狀圖可看詳細佔比</p>
              </div>
            </div>
            <div className="flex items-center gap-5 text-[11px] text-muted font-medium bg-cream border border-line rounded-xl px-5 py-2.5">
              <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-copper"></span> 底薪</div>
              <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-tan"></span> ESPP淨利</div>
              <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-walnut"></span> RSU總額</div>
            </div>
          </header>

          <div className="flex items-end justify-around gap-4 pt-4 px-2">
            {yearlyData.map((d, idx) => {
              const bH = (d.base / maxTC) * 100;
              const eH = (d.esppGain / maxTC) * 100;
              const rH = (d.rsuTotal / maxTC) * 100;
              const prev = idx > 0 ? yearlyData[idx-1].total : null;
              const yoy = prev ? ((d.total - prev) / prev * 100).toFixed(1) : null;
              const up = yoy !== null && Number(yoy) >= 0;

              return (
                <div key={d.year} className="flex-1 flex flex-col items-center group relative max-w-[140px]">

                  {/* 標籤區固定高度確保對齊 */}
                  <div className="h-20 flex flex-col items-center justify-end gap-2 mb-3">
                    {yoy !== null ? (
                      <span className={`inline-flex items-center gap-1 text-[11px] font-medium px-2.5 py-0.5 rounded-md border ${up ? 'text-emerald-700 bg-emerald-50 border-emerald-100' : 'text-rose-700 bg-rose-50 border-rose-100'}`}>
                        {up ? <ArrowUp size={11}/> : <ArrowDown size={11}/>}
                        {up ? '+' : ''}{yoy}%
                      </span>
                    ) : <div className="h-[20px]"></div>}
                    <div className="font-serif-display text-lg text-ink group-hover:text-copper transition-colors">
                      {(d.total/1000000).toFixed(2)}<span className="text-xs text-muted ml-0.5">M</span>
                    </div>
                  </div>

                  {/* Tooltip */}
                  <div className="absolute top-24 hidden group-hover:flex flex-col bg-ink text-cream text-xs p-4 rounded-xl shadow-2xl z-50 whitespace-nowrap min-w-[220px] border border-walnut/30" style={{backgroundColor: 'var(--claude-ink)'}}>
                    <div className="font-serif-display border-b border-walnut/30 mb-3 pb-2 text-center text-sm text-tan">{d.year} Breakdown</div>
                    <div className="space-y-2">
                      <div className="flex justify-between gap-8"><span className="text-stone-400">底薪佔比</span><span className="font-mono">{((d.base/d.total)*100).toFixed(1)}%</span></div>
                      <div className="flex justify-between gap-8"><span style={{color: 'var(--claude-copper)'}}>ESPP 淨利</span><span className="font-mono" style={{color: 'var(--claude-copper)'}}>{((d.esppGain/d.total)*100).toFixed(1)}%</span></div>
                      <div className="flex justify-between gap-8"><span style={{color: 'var(--claude-tan)'}}>RSU 收益</span><span className="font-mono" style={{color: 'var(--claude-tan)'}}>{((d.rsuTotal/d.total)*100).toFixed(1)}%</span></div>
                    </div>
                    <div className="flex justify-between mt-3 pt-3 border-t border-walnut/30 text-sm">
                      <span className="text-stone-400">年度總報酬</span>
                      <span className="font-serif-display" style={{color: 'var(--claude-tan)'}}>{formatCurrency(d.total)}</span>
                    </div>
                  </div>

                  {/* 堆疊柱狀 */}
                  <div className="w-full max-w-[80px] h-64 flex flex-col-reverse cursor-pointer transition-all duration-300 group-hover:-translate-y-1">
                    <div className="w-full bg-copper rounded-b-lg transition-all group-hover:brightness-105" style={{height:`${bH}%`}}/>
                    <div className="w-full bg-tan transition-all group-hover:brightness-105" style={{height:`${eH}%`}}/>
                    <div className="w-full bg-walnut rounded-t-lg transition-all group-hover:brightness-105" style={{height:`${rH}%`}}/>
                  </div>

                  <div className="mt-4 font-serif-display text-lg text-muted group-hover:text-copper transition-colors">{d.year}</div>
                </div>
              );
            })}
          </div>
        </section>

        {/* Footer */}
        <footer className="text-center text-xs text-muted pt-2 pb-4 font-serif-display italic">
          數據僅供個人試算參考 · 實際收益受市場波動、稅務、公司政策影響
        </footer>

      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
